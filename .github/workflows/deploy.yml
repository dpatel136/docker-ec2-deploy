name: Deploy Docker WebApp to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t mywebapp:latest .

      - name: Save Docker image
        run: |
          docker save mywebapp:latest -o mywebapp.tar
          chmod 644 mywebapp.tar

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "mywebapp.tar"
          target: "/home/ec2-user/"

      - name: Run Docker container on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            sudo docker load -i /home/ubuntu/mywebapp.tar
            sudo docker stop mywebapp || true
            sudo docker rm mywebapp || true
            sudo docker run -d -p 8086:80 --name mywebapp mywebapp:latest

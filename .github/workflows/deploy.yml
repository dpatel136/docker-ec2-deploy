name: Deploy Docker WebApp to EC2

on:
  push:
    branches: [ "main" ]   # यहाँ कोई extra character नहीं होना चाहिए

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t mywebapp:latest .

    - name: Save Docker image
      run: |
        docker save mywebapp:latest -o mywebapp.tar

    - name: Copy image to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "mywebapp.tar"
        target: "~/"

    - name: Run Docker container on EC2
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker load -i ~/mywebapp.tar
          docker stop mywebapp || true
          docker rm mywebapp || true
          docker run -d --name mywebapp -p 8086:80 mywebapp:latest
